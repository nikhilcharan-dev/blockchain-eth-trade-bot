<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="4" y="4" width="504" height="504" rx="106" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Chart bars -->
  <rect x="100" y="300" width="56" height="112" rx="10" fill="rgba(255,255,255,0.12)"/>
  <rect x="180" y="220" width="56" height="192" rx="10" fill="rgba(255,255,255,0.18)"/>
  <rect x="260" y="260" width="56" height="152" rx="10" fill="rgba(255,255,255,0.12)"/>
  <rect x="340" y="170" width="56" height="242" rx="10" fill="rgba(255,255,255,0.18)"/>
  <!-- Uptrend line -->
  <polyline points="128,280 208,200 288,240 368,150" fill="none" stroke="url(#accent)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow head on trend line -->
  <polygon points="368,150 395,140 380,168" fill="url(#accent)"/>
  <!-- Coin circle -->
  <circle cx="390" cy="120" r="52" fill="#e53935" opacity="0.95"/>
  <!-- Dollar/crypto symbol in coin -->
  <text x="390" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="60" font-weight="bold" fill="#fff">$</text>
</svg>
