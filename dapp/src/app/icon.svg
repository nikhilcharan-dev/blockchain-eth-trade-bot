<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00c853"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Chart bars -->
  <rect x="100" y="300" width="56" height="112" rx="10" fill="rgba(255,255,255,0.25)"/>
  <rect x="180" y="220" width="56" height="192" rx="10" fill="rgba(255,255,255,0.35)"/>
  <rect x="260" y="260" width="56" height="152" rx="10" fill="rgba(255,255,255,0.25)"/>
  <rect x="340" y="170" width="56" height="242" rx="10" fill="rgba(255,255,255,0.35)"/>
  <!-- Uptrend line -->
  <polyline points="128,280 208,200 288,240 368,150" fill="none" stroke="url(#accent)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow head on trend line -->
  <polygon points="368,150 395,140 380,168" fill="url(#accent)"/>
  <!-- Coin circle -->
  <circle cx="390" cy="120" r="52" fill="url(#accent)" opacity="0.9"/>
  <!-- Dollar/crypto symbol in coin -->
  <text x="390" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="60" font-weight="bold" fill="#1a1a2e">$</text>
</svg>
